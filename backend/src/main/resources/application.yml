spring:
  application:
    name: ordering-backend
  datasource:
    url: jdbc:h2:mem:ordering;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  messages:
    basename: i18n/messages
    encoding: UTF-8
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
